<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>حلا | 18 🎀</title>

<link rel="icon" type="image/png" href="icon.png">

<style>
  :root{
    --bg1:#ffb6d5; --bg2:#ffd6ea;
    --pink:#ff4fa3; --pink2:#ff7fc3;
    --text:#3b2b2f;
    --border:#ffd1e7;

    /* جماليات */
    --glass: rgba(255,255,255,.86);
    --shadow: 0 18px 55px rgba(0,0,0,.14);
    --shadow2: 0 12px 30px rgba(255,79,163,.20);
  }
  *{ box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    margin:0;
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
    overflow-y:auto;
    padding: clamp(18px, 4vh, 42px) 0;
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:flex-start;
  }

  /* Aurora خلفية */
  .aurora{
    position:fixed; inset:-20%;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,79,163,.35), transparent 45%),
      radial-gradient(circle at 80% 20%, rgba(255,190,220,.35), transparent 48%),
      radial-gradient(circle at 30% 85%, rgba(255,255,255,.28), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(255,120,200,.28), transparent 48%);
    filter: blur(26px) saturate(1.1);
    animation: auroraMove 14s ease-in-out infinite alternate;
    z-index:0;
    pointer-events:none;
  }
  @keyframes auroraMove{
    0%{ transform: translate3d(-2%, 0%, 0) scale(1.02) rotate(-2deg); }
    100%{ transform: translate3d(2%, -1%, 0) scale(1.06) rotate(2deg); }
  }

  .sparkle{
    position:fixed; inset:-30px;
    background-image:
      radial-gradient(#fff8 1px, transparent 1px),
      radial-gradient(#fff6 1px, transparent 1px);
    background-size: 28px 28px, 44px 44px;
    background-position: 0 0, 10px 18px;
    animation: float 10s linear infinite;
    pointer-events:none; opacity:.6;
    z-index:0;
  }
  @keyframes float{ from{transform:translateY(0)} to{transform:translateY(-40px)} }

  .card{
    width: min(92vw, 720px);
    background: var(--glass);
    padding: clamp(14px, 2.2vw, 22px);
    border-radius: 22px;
    text-align:center;
    box-shadow: var(--shadow);
    position:relative;
    backdrop-filter: blur(10px);
    z-index:1;
    border: 1px solid rgba(255,255,255,.55);
    transform-style: preserve-3d;
    transition: transform .12s ease;
  }

  /* لمعة تمر على البطاقة */
  .card::before{
    content:"";
    position:absolute; inset:-2px;
    border-radius: 24px;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,.65), transparent);
    transform: translateX(-120%);
    animation: shine 6.5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes shine{
    0%,65%{ transform: translateX(-120%); opacity:.0; }
    75%{ opacity:.55; }
    100%{ transform: translateX(120%); opacity:0; }
  }

  /* شريط التحكم */
  .topControls{
    position: sticky;
    top: 10px;
    display:flex;
    gap:10px;
    justify-content:center;
    z-index:3;
    margin-bottom: 10px;
  }
  .pillBtn{
    border:1px solid var(--border);
    background: rgba(255,255,255,.80);
    backdrop-filter: blur(10px);
    border-radius: 999px;
    padding: 10px 12px;
    font-weight: 950;
    cursor:pointer;
    box-shadow: 0 10px 22px rgba(0,0,0,.10);
    transition: transform .12s ease, filter .2s ease;
  }
  .pillBtn:active{ transform: scale(.98); }

  .badges{
    display:flex; gap:10px;
    justify-content:space-between; align-items:center;
    flex-wrap:wrap;
    margin-bottom:8px;
  }
  .badge{
    display:inline-flex; align-items:center; gap:8px;
    padding:8px 12px; border-radius:999px;
    background:linear-gradient(135deg, #fff, #ffe8f3);
    border:1px solid var(--border);
    font-weight:900;
    font-size: 13px;
  }

  /* عنوان + صورة + Glow + دوران */
  .title{
    margin:10px 0 6px;
    font-size: clamp(20px, 2.6vw, 28px);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
  }
  .iconWrapper{
    display:flex;
    align-items:center;
    justify-content:center;
    width:40px;
    height:40px;
    border-radius:50%;
    animation: glowPulse 2.5s ease-in-out infinite;
  }
  .titleIcon{
    width:34px;
    height:34px;
    border-radius:50%;
    animation: slowSpin 8s linear infinite;
  }
  @keyframes slowSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
  @keyframes glowPulse{
    0%{ box-shadow:0 0 8px rgba(255,79,163,0.4); }
    50%{ box-shadow:0 0 18px rgba(255,79,163,0.85); }
    100%{ box-shadow:0 0 8px rgba(255,79,163,0.4); }
  }

  p.sub{
    margin:0 0 14px;
    opacity:.88;
    line-height:1.8;
    font-size: clamp(13px, 1.7vw, 15px);
  }

  /* Fade Slider */
  .fadeSlider{
    width: min(72vw, 210px);
    aspect-ratio: 1 / 1;
    border-radius:22px;
    overflow:hidden;
    border:1px solid var(--border);
    background:linear-gradient(135deg,#ffe4f1,#fff);
    position:relative;
    margin:12px auto 6px;
    touch-action: pan-y;
  }
  .fadeSlide{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0;
    transform:scale(1.02);
    transition: opacity 700ms ease, transform 900ms ease;
    will-change: opacity, transform;
  }
  .fadeSlide.active{ opacity:1; transform:scale(1); }

  .dots{
    position:absolute;
    left:50%; bottom:8px;
    transform:translateX(-50%);
    display:flex; gap:6px;
    padding:6px 8px;
    border-radius:999px;
    background:#ffffffb0;
    border:1px solid var(--border);
    backdrop-filter:blur(6px);
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background:#ffb7da; opacity:.75; cursor:pointer;
    transition:transform .2s ease, opacity .2s ease, background .2s ease;
  }
  .dot.active{ background:var(--pink); opacity:1; transform:scale(1.25); }

  .fileNote{
    margin-top:6px;
    font-size:12px;
    opacity:.75;
    line-height:1.7;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }

  .btn{
    flex:1;
    border:none;
    padding:12px 14px;
    border-radius:14px;
    font-weight:900;
    cursor:pointer;
    font-size:15px;
    transition: transform .12s ease;
  }
  .btn.primary{
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    color:white;
  }
  .btn.secondary{
    background:#fff;
    color:var(--pink);
    border:1px solid var(--border);
  }
  .btn:active{ transform:scale(0.99); }

  /* Quiz */
  .quiz{
    margin-top:14px;
    text-align:center;
    background:#fff;
    border:1px solid var(--border);
    border-radius:18px;
    padding:44px 14px 14px;
    position:relative;
    overflow:hidden;
    box-shadow: var(--shadow2);
  }
  .quizTag{
    position:absolute;
    top:12px;
    left:14px;
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    color:#fff;
    padding:6px 10px;
    border-radius:999px;
    font-weight:900;
    box-shadow:0 10px 18px rgba(255,79,163,.22);
    font-size:12px;
  }
  .qText{
    font-weight:950;
    line-height:1.9;
    margin:8px 0 10px;
    font-size: clamp(15px, 2vw, 18px);
  }
  .qSmall{
    font-size:12px;
    opacity:.75;
    margin:0 0 12px;
  }
  .qBtn{
    width:min(320px, 92%);
    margin:0 auto;
  }

  /* زر يهرب */
  .moveArea{
    position:relative;
    height:74px;
    margin-top:2px;
  }
  .movingBtn{
    position:absolute;
    left:50%;
    top:10px;
    transform:translateX(-50%);
    width:min(320px, 92%);
  }

  /* قلب */
  .heartBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:min(320px, 92%);
    padding:12px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background:linear-gradient(135deg, #fff, #ffe8f3);
    font-weight:950;
    cursor:pointer;
    user-select:none;
    transition: transform .12s ease, filter .2s ease;
    margin:0 auto;
  }
  .heartBtn:active{ transform:scale(0.98); }
  .heartIcon{
    width:34px; height:34px;
    border-radius:999px;
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    display:grid; place-items:center;
    box-shadow:0 10px 18px rgba(255,79,163,.25);
    color:#fff;
    font-size:18px;
  }

  /* Gift */
  .gift{
    display:none;
    margin-top:14px;
    text-align:right;
    background:#fff;
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px;
    line-height:2;
    font-weight:800;
    position:relative;
    white-space:pre-wrap;
    font-size: clamp(13px, 1.8vw, 15px);
    box-shadow: var(--shadow2);
  }
  .ribbon{
    position:absolute;
    top:-10px; left:18px;
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    color:#fff;
    padding:6px 10px;
    border-radius:999px;
    font-weight:900;
    box-shadow:0 10px 18px rgba(255,79,163,.22);
    font-size:12px;
  }

  .typed{
    border-left: 2px solid var(--pink);
    padding-left:6px;
    animation: caret .9s steps(1) infinite;
  }
  @keyframes caret{ 50%{border-left-color:transparent} }

  /* shake */
  @keyframes shake{
    0%,100%{ transform: translateX(-50%) translateY(0); }
    20%{ transform: translateX(-50%) translateY(0) translateX(-6px); }
    40%{ transform: translateX(-50%) translateY(0) translateX(6px); }
    60%{ transform: translateX(-50%) translateY(0) translateX(-5px); }
    80%{ transform: translateX(-50%) translateY(0) translateX(5px); }
  }
  .shake{ animation: shake 360ms ease; }

  /* Effects */
  .heart{
    position:fixed;
    font-size:18px;
    opacity:.9;
    animation: pop 1.2s ease forwards;
    pointer-events:none;
    filter: drop-shadow(0 6px 10px rgba(255,79,163,.22));
    z-index:6;
  }
  @keyframes pop{
    0%{transform:translate(-50%,-50%) scale(.6); opacity:0}
    20%{opacity:1}
    100%{transform:translate(-50%,-140%) scale(1.25); opacity:0}
  }
  .confetti{
    position:fixed;
    top:-20px;
    transition: transform 1.7s ease, opacity 1.7s ease;
    will-change: transform;
    pointer-events:none;
    z-index:7;
  }
  .toast{
    position:fixed;
    bottom:16px; left:50%;
    transform:translateX(-50%);
    background:#ffffffd9;
    border:1px solid var(--border);
    padding:10px 12px;
    border-radius:999px;
    box-shadow:0 10px 24px rgba(0,0,0,0.12);
    display:none;
    font-weight:900;
    z-index:9999;
  }

  .hint{
    font-size:13px;
    opacity:.8;
    margin:10px 0 0;
    line-height:1.7;
  }

  /* Reveal */
  .reveal{
    opacity:0;
    transform: translateY(14px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .reveal.show{
    opacity:1;
    transform: translateY(0);
  }

  /* فقاعات خلفية */
  .bubble{
    position:fixed;
    bottom:-40px;
    font-size:16px;
    opacity:.65;
    animation: bubbleUp linear forwards;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.12));
    pointer-events:none;
    z-index:0;
  }
  @keyframes bubbleUp{
    from{ transform: translateY(0) translateX(0) scale(.8); opacity:.0; }
    15%{ opacity:.75; }
    to{ transform: translateY(-115vh) translateX(var(--drift)) scale(1.2); opacity:0; }
  }

  /* وضع داكن */
  body.dark{
    background: linear-gradient(135deg, #1b1320, #2a1a2f);
    color: #f7eaf1;
  }
  body.dark .sparkle{ opacity:.25; }
  body.dark .aurora{ opacity:.55; }
  body.dark .card{
    background: rgba(30, 20, 30, .74);
    border: 1px solid rgba(255,255,255,.12);
  }
  body.dark .badge,
  body.dark .quiz,
  body.dark .gift,
  body.dark .toast,
  body.dark .pillBtn{
    background: rgba(20, 14, 22, .72);
    border-color: rgba(255,255,255,.12);
    color: #f7eaf1;
  }
  body.dark .btn.secondary{
    background: rgba(20, 14, 22, .72);
    color: #ff9dd1;
  }
</style>
</head>

<body>
  <div class="aurora"></div>
  <div class="sparkle"></div>

  <div class="card" id="card">
    <div class="topControls">
      <button class="pillBtn" id="toggleTheme">🌙 الوضع</button>
      <button class="pillBtn" id="toggleSound">🔊 الصوت</button>
    </div>

    <div class="badges">
      <div class="badge">🎀 مفاجأة لحلا</div>
      <div class="badge" id="dateBadge">📅 اليوم</div>
    </div>

    <h1 class="title">
      <span>🎂 حلا - 18 سنة 🎀</span>
      <span class="iconWrapper">
        <img src="icon.png" class="titleIcon" alt="icon">
      </span>
    </h1>

    <p class="sub">جاوبي خطوة خطوة 💞…وبكل صدق 🤨</p>

    <div class="fadeSlider" id="fadeSlider" aria-label="سلايدر صور (تلاشي)">
      <img class="fadeSlide active" src="photo1.png" alt="صورة 1">
      <img class="fadeSlide" src="photo2.png" alt="صورة 2">
      <img class="fadeSlide" src="photo3.png" alt="صورة 3">
      <img class="fadeSlide" src="photo4.png" alt="صورة 4">
      <img class="fadeSlide" src="photo5.png" alt="صورة 5">
      <div class="dots" id="dots"></div>
    </div>

    <div class="fileNote">ملاحظة هاد الموقع صنع بكل حب لـ احلى بنت بالعالم</div>

    <div class="actions">
      <button class="btn secondary" id="replay">عيدي الحركات ✨</button>
      <button class="btn secondary" id="copyLink">انسخي الرابط</button>
    </div>

    <div class="quiz" id="quizBox">
      <div class="quizTag">💞 أسئلة</div>
      <div class="qText" id="qText">انتي حلا؟</div>
      <div class="qSmall" id="qSmall">اضغطي الزر عشان نكمل…</div>

      <div id="answerArea">
        <button class="btn primary qBtn" id="qBtn">اي حلا</button>
      </div>
    </div>

    <div class="gift" id="giftBox">
      <div class="ribbon">💖 تهنئة</div>
      <div id="giftText"></div>
    </div>

    <p class="hint">تلميح: اسحبي على الصورة يمين/يسار للتغيير ✨ واضغطي داخل البطاقة تطلع قلوب 💗</p>
  </div>

  <div class="toast" id="toast">تم ✅</div>

<script>
  const $ = (id)=>document.getElementById(id);

  // التاريخ
  const now = new Date();
  const fmt = new Intl.DateTimeFormat("ar-SA", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
  $("dateBadge").textContent = "📅 " + fmt.format(now);

  // رسالة التهنئة
  const message = `
في مثل هذا اليوم ابدع الله في خلق هذه الجميلة، كلُ عامٍ وانتِ قمري الذي اكتفي به، كلُ عامٍ وانتِ ضوء حياتي، سأحبك إلى الأبد دائما وابدا وأتمنى لك ايام سعيدة جدا وهذا هو يومك لذلك يجب ان تستغليه اشد الاستغلال واحبك عسولتي وحبوبتي ودلوعتي لازم تستغلي هاد اليوم اشد الاستغلال بما انك كملتي ١٨ سنة وان شاء الله تكون سنة خير عليك يارب وانا ناشب لك ناشب لك بكل سنة ترا ان شاء الله وراح أكون معك بكل سنينك ان شاء الله 🫡💞

وأتمنى ربي يحقق لك كل أمنياتك وحدة وحدة بدون ما ينقصها شي 🤍✨
وأتمنى ضحكتك تبقى عالية مثل اليوم وكل أيامك تكون مليانة راحة واطمئنان 🌸
يا رب تكون سنة نضج أجمل، نجاح أكبر، وأحلام تتحقق قدام عيونك 🎂💖
وتكون بداية عشريناتك بداية قوة وثقة وإنجازات تخليني أفتخر فيك أكثر وأكثر 💞
وكل سنة تكبرين قدامي وأقول الحمدلله إنك في حياتي 🌷✨
`;

  function showToast(text){
    const t = $("toast");
    t.textContent = text;
    t.style.display = "block";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>t.style.display="none", 1400);
  }

  // تحكم الصوت
  let soundOn = true;

  // Beep لطيف (يحترم كتم الصوت)
  let audioCtx = null;
  function beep(type = "escape"){
    if(!soundOn) return;
    try{
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === "suspended") audioCtx.resume();

      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      o.type = "sine";
      o.frequency.value = (type === "escape") ? 880 : 660;

      const t = audioCtx.currentTime;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

      o.connect(g);
      g.connect(audioCtx.destination);

      o.start(t);
      o.stop(t + 0.13);
    }catch(e){}
  }

  function typeWriter(el, text, speed=14){
    el.classList.add("typed");
    el.textContent = "";
    let i = 0;
    clearInterval(typeWriter._t);
    typeWriter._t = setInterval(()=>{
      el.textContent += text[i] ?? "";
      i++;
      if(i > text.length){
        clearInterval(typeWriter._t);
        setTimeout(()=>el.classList.remove("typed"), 600);
      }
    }, speed);
  }

  function burst(){
    const symbols=["💗","✨","🎀","🌸","🎂","💞","⭐️"];
    for(let i=0;i<30;i++){
      const s=document.createElement("div");
      s.className="confetti";
      s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
      s.style.left=Math.random()*100+"vw";
      s.style.fontSize=(14+Math.random()*18)+"px";
      s.style.opacity=0.95;
      document.body.appendChild(s);

      requestAnimationFrame(()=>{
        const x = (Math.random()*60 - 30);
        const y = (window.innerHeight + 140);
        s.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random()*240-120}deg)`;
        s.style.opacity = 0;
      });

      setTimeout(()=>s.remove(), 1800);
    }
  }

  // قلوب عند الضغط داخل البطاقة
  $("card").addEventListener("click",(e)=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.textContent="💗";
    heart.style.left=e.clientX+"px";
    heart.style.top=e.clientY+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),1200);
  });

  $("replay").addEventListener("click", ()=>{
    burst();
    showToast("يلا نعيد ✨");
  });

  $("copyLink").addEventListener("click", async ()=>{
    try{
      await navigator.clipboard.writeText(location.href);
      showToast("تم نسخ الرابط ✅");
    }catch{
      prompt("انسخي الرابط:", location.href);
    }
  });

  // أزرار التحكم
  $("toggleSound").addEventListener("click", ()=>{
    soundOn = !soundOn;
    $("toggleSound").textContent = soundOn ? "🔊 الصوت" : "🔇 كتم";
    showToast(soundOn ? "الصوت شغال 🔊" : "تم الكتم 🔇");
  });

  $("toggleTheme").addEventListener("click", ()=>{
    document.body.classList.toggle("dark");
    showToast(document.body.classList.contains("dark") ? "وضع داكن 🌙" : "وضع فاتح ☀️");
  });

  // ===== الأسئلة + زر يهرب =====
  const steps = [
    { q: "🤨 انتي حلا؟", btn: { type:"normal", text:"اي حلا" } },
    { q: "🧐 عندي الك سؤال", btn: { type:"normal", text:"اي شو هو؟" } },
    { q: "🔥 بتحبي عمر ولا لا؟", btn: { type:"normal", text:"هاااااا؟" } },
    { q: "😾 شو هااااا بتحبي عمر ولا لا؟", btn: { type:"escape", text:"ما بعرف" } },
    { q: "لو بتحبي عمر اضغطي على القلب 💗", btn: { type:"heart" } }
  ];

  let stepIndex = 0;
  let escapeTries = 0;

  const qText = $("qText");
  const qSmall = $("qSmall");
  const answerArea = $("answerArea");

  function renderStep(){
    const s = steps[stepIndex];
    qText.textContent = s.q;

    if(s.btn.type === "normal"){
      qSmall.textContent = "اضغطي الزر عشان نكمل…";
      answerArea.innerHTML = `<button class="btn primary qBtn" id="qBtn">${s.btn.text}</button>`;
      $("qBtn").addEventListener("click", ()=>{
        burst();
        stepIndex++;
        renderStep();
      });
      return;
    }

    if(s.btn.type === "escape"){
      qSmall.textContent = "اضغطيه إذا تقدري 😼 (الزر بيهرب!)";
      answerArea.innerHTML = `
        <div class="moveArea" id="moveArea">
          <button class="btn primary movingBtn" id="escapeBtn">${s.btn.text}</button>
        </div>
      `;
      escapeTries = 0;

      const moveArea = $("moveArea");
      const escapeBtn = $("escapeBtn");

      function randomMove(){
        const area = moveArea.getBoundingClientRect();
        const btn  = escapeBtn.getBoundingClientRect();

        const maxX = Math.max(0, area.width - btn.width);
        const maxY = Math.max(0, area.height - btn.height);

        const x = Math.floor(Math.random() * maxX);
        const y = Math.floor(Math.random() * maxY);

        escapeBtn.style.left = x + "px";
        escapeBtn.style.top  = y + "px";
        escapeBtn.style.transform = "none";
      }

      function doEscape(){
        escapeTries++;
        beep("escape");
        burst();

        escapeBtn.classList.remove("shake");
        void escapeBtn.offsetWidth;
        escapeBtn.classList.add("shake");

        randomMove();

        if(escapeTries >= 6){
          qSmall.textContent = "خلاص خلاص… استسلمت 🫢 اضغطيه مرّة أخيرة";
          escapeBtn.textContent = "طيب… كملي 😼";
          escapeBtn.onclick = ()=>{
            burst();
            stepIndex++;
            renderStep();
          };
        }
      }

      escapeBtn.addEventListener("mouseenter", doEscape);
      escapeBtn.addEventListener("touchstart", (e)=>{
        e.preventDefault();
        doEscape();
      }, {passive:false});
      escapeBtn.addEventListener("click", (e)=>{
        e.preventDefault();
        doEscape();
      });

      setTimeout(randomMove, 200);
      return;
    }

    if(s.btn.type === "heart"){
      qSmall.textContent = "هذا آخر شي… اضغطي القلب عشان تطلع المفاجأة ✨";
      answerArea.innerHTML = `
        <div class="heartBtn" id="heartBtn" role="button" aria-label="زر قلب">
          <span class="heartIcon">💗</span>
          <span>اضغطي على القلب</span>
        </div>
      `;
      $("heartBtn").addEventListener("click", ()=>{
        beep("heart");
        burst();
        $("quizBox").style.display = "none";
        const box = $("giftBox");
        box.style.display = "block";
        $("giftText").textContent = "";
        typeWriter($("giftText"), message, 12);
        showToast("وصلتي للتهنئة 💖");
        box.scrollIntoView({behavior:"smooth", block:"start"});
      });
      return;
    }
  }

  renderStep();

  // ===== Fade Slider Logic =====
  const slider = $("fadeSlider");
  const slides = Array.from(slider.querySelectorAll(".fadeSlide"));
  const dotsEl = $("dots");
  let idx = 0;
  let timer = null;

  function buildDots(){
    dotsEl.innerHTML = "";
    slides.forEach((_, i)=>{
      const d = document.createElement("div");
      d.className = "dot" + (i===0 ? " active" : "");
      d.addEventListener("click", ()=> goTo(i, true));
      dotsEl.appendChild(d);
    });
  }
  function updateDots(){
    const dots = Array.from(dotsEl.children);
    dots.forEach((d,i)=> d.classList.toggle("active", i===idx));
  }
  function show(i){
    slides[idx].classList.remove("active");
    idx = (i + slides.length) % slides.length;
    slides[idx].classList.add("active");
    updateDots();
  }
  function goTo(i, user=false){
    show(i);
    if(user) restartAuto();
  }
  function next(){ show(idx + 1); }
  function startAuto(){ timer = setInterval(next, 2800); }
  function stopAuto(){ clearInterval(timer); timer = null; }
  function restartAuto(){ stopAuto(); startAuto(); }

  buildDots();
  startAuto();

  // Swipe للجوال
  let startX = 0, deltaX = 0, dragging = false;

  slider.addEventListener("touchstart", (e)=>{
    dragging = true;
    startX = e.touches[0].clientX;
    deltaX = 0;
    stopAuto();
  }, {passive:true});

  slider.addEventListener("touchmove", (e)=>{
    if(!dragging) return;
    deltaX = e.touches[0].clientX - startX;
  }, {passive:true});

  slider.addEventListener("touchend", ()=>{
    if(!dragging) return;
    dragging = false;

    if(deltaX > 45) goTo(idx - 1, true);
    else if(deltaX < -45) goTo(idx + 1, true);
    else restartAuto();

    deltaX = 0;
  }, {passive:true});

  slider.addEventListener("mouseenter", stopAuto);
  slider.addEventListener("mouseleave", startAuto);

  // ===== Tilt بسيط للبطاقة =====
  (function tiltCard(){
    const card = $("card");
    card.addEventListener("mousemove", (e)=>{
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      const rx = (-y * 6).toFixed(2);
      const ry = (x * 8).toFixed(2);
      card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    card.addEventListener("mouseleave", ()=>{
      card.style.transform = "rotateX(0deg) rotateY(0deg)";
    });
  })();

  // ===== Reveal عند الظهور =====
  (function reveal(){
    const els = document.querySelectorAll(".badges, .title, .sub, .fadeSlider, .actions, .quiz, .gift, .hint");
    els.forEach(el=> el.classList.add("reveal"));

    const io = new IntersectionObserver((entries)=>{
      entries.forEach(en=>{
        if(en.isIntersecting) en.target.classList.add("show");
      });
    }, {threshold: 0.12});

    els.forEach(el=> io.observe(el));
  })();

  // ===== فقاعات خلفية =====
  (function bubbles(){
    const icons = ["✨","💗","🎀","⭐️","🌸"];
    setInterval(()=>{
      const b = document.createElement("div");
      b.className = "bubble";
      b.textContent = icons[Math.floor(Math.random()*icons.length)];
      b.style.left = Math.random()*100 + "vw";
      b.style.setProperty("--drift", (Math.random()*120 - 60) + "px");
      b.style.animationDuration = (7 + Math.random()*6).toFixed(2) + "s";
      b.style.fontSize = (14 + Math.random()*18).toFixed(0) + "px";
      document.body.appendChild(b);
      setTimeout(()=> b.remove(), 14000);
    }, 650);
  })();
</script>

</body>
